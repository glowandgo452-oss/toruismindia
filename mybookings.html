<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings | Tourism of India</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/684/684908.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
  body{background:#fef9f0;color:#2c3e2f;}
  .navbar{background:#1a472a;padding:1rem 2rem;position:sticky;top:0;z-index:1000;}
  .nav-container{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;}
  .logo{font-size:1.4rem;font-weight:bold;color:#ffd966;}
  .logo i{color:#ffb347;margin-right:8px;}
  .nav-links{display:flex;gap:1.5rem;list-style:none;align-items:center;flex-wrap:wrap;}
  .nav-links a{text-decoration:none;color:#ffebc2;font-weight:600;transition:0.3s;}
  .nav-links a:hover,.nav-links a.active{color:#ffb347;}
  .nav-user{color:#ffb347;font-size:0.85rem;font-weight:600;}
  .page-header{text-align:center;padding:3rem 2rem;background:linear-gradient(135deg,#2b5e3b,#1a472a);color:white;}
  .page-header h1{font-size:2.5rem;margin-bottom:0.5rem;}
  .search-section{max-width:600px;margin:2rem auto;padding:0 2rem;text-align:center;}
  .search-box{display:flex;gap:0.5rem;margin-top:1rem;}
  .search-box input{flex:1;padding:12px 20px;border:2px solid #ddd;border-radius:50px;font-size:1rem;outline:none;transition:0.3s;}
  .search-box input:focus{border-color:#ffb347;}
  .search-box button{padding:12px 25px;background:#ffb347;border:none;border-radius:50px;font-weight:bold;cursor:pointer;transition:0.3s;color:#1a472a;}
  .search-box button:hover{background:#e67e22;color:white;}
  .bookings-container{max-width:900px;margin:2rem auto;padding:0 2rem;}
  .booking-card{background:white;border-radius:20px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 5px 20px rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;transition:0.3s;}
  .booking-card:hover{transform:translateX(5px);}
  .booking-info h3{font-size:1.2rem;color:#1a472a;margin-bottom:0.5rem;}
  .booking-info p{color:#666;font-size:0.9rem;margin:4px 0;}
  .booking-info i{color:#ffb347;margin-right:6px;width:16px;}
  .booking-status{background:#d4edda;color:#155724;padding:8px 16px;border-radius:20px;font-weight:bold;font-size:0.85rem;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .type-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:bold;margin-bottom:0.5rem;}
  .type-place{background:#e3f2fd;color:#1565c0;}
  .type-package{background:#f3e5f5;color:#6a1b9a;}
  .empty-state{text-align:center;padding:3rem;color:#666;}
  .empty-state i{font-size:3rem;color:#ffb347;margin-bottom:1rem;display:block;}
  .empty-state a{color:#ffb347;text-decoration:none;font-weight:bold;}
  footer{background:#1a2a1f;text-align:center;padding:1.5rem;color:#c9d1b7;margin-top:3rem;}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo"><i class="fas fa-map-marked-alt"></i> Tourism of India</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="places.html">Places</a></li>
      <li><a href="package.html">Packages</a></li>
      <li><a href="mybookings.html" class="active">My Bookings</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><span class="nav-user" id="userNavName"></span></li>
      <li><a href="register.html" id="authNavLink">Login / Register</a></li>
    </ul>
  </div>
</nav>

<div class="page-header">
  <h1><i class="fas fa-ticket-alt"></i> My Bookings</h1>
  <p>Enter your email to view all your travel bookings</p>
</div>

<div class="search-section">
  <div class="search-box">
    <input type="email" id="emailInput" placeholder="Enter your email address..." onkeypress="if(event.key==='Enter')viewBookings()">
    <button onclick="viewBookings()"><i class="fas fa-search"></i> Search</button>
  </div>
</div>

<div class="bookings-container">
  <div id="bookingsList"></div>
</div>

<footer>© 2025 Tourism of India. All rights reserved.</footer>

<script>
  // Auto-fill email if logged in
  window.addEventListener('DOMContentLoaded', () => {
    const user = JSON.parse(localStorage.getItem('current_user') || 'null');
    if (user && user.email) {
      document.getElementById('emailInput').value = user.email;
      viewBookings();
    }
  });

  function viewBookings() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) { alert('Please enter your email address'); return; }
    const container = document.getElementById('bookingsList');
    const all = JSON.parse(localStorage.getItem('tourism_all_bookings') || '[]');
    const userBookings = all.filter(b => b.userEmail.toLowerCase() === email.toLowerCase());
    if (userBookings.length === 0) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>No bookings found for <strong>${email}</strong></p><p style="margin-top:0.5rem;">Start exploring! <a href="places.html">View Places</a> or <a href="package.html">View Packages</a></p></div>`;
      return;
    }
    // Sort by most recent
    userBookings.sort((a,b) => new Date(b.bookingDate) - new Date(a.bookingDate));
    container.innerHTML = userBookings.map(b => {
      const isPlace = b.type === 'place';
      return `<div class="booking-card">
        <div class="booking-info">
          <span class="type-badge ${isPlace?'type-place':'type-package'}">${isPlace?'🗺️ Place':'📦 Package'}</span>
          <h3><i class="fas ${isPlace?'fa-map-marker-alt':'fa-suitcase'}"></i> ${b.placeName||b.packageName}</h3>
          <p><i class="fas fa-user"></i> ${b.userName}</p>
          <p><i class="fas fa-calendar"></i> Travel Date: <strong>${b.travelDate}</strong></p>
          <p><i class="fas fa-users"></i> ${b.seats||b.travelers} ${isPlace?'Seat(s)':'Traveler(s)'}</p>
          <p><i class="fas fa-rupee-sign"></i> Total: <strong>₹${b.totalAmount.toLocaleString()}</strong></p>
          <p><i class="fas fa-clock"></i> Booked: ${new Date(b.bookingDate).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</p>
          <p style="color:#aaa;font-size:0.8rem;margin-top:4px;">🆔 Booking ID: #${b.id}</p>
        </div>
        <div class="booking-status"><i class="fas fa-check-circle"></i> Confirmed</div>
      </div>`;
    }).join('');
  }
</script>
<script type="module" src="global-auth.js"></script>
</body>
</html>
