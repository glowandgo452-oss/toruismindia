<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Tourism of India</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/684/684908.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
  body{background:#f0f2f5;color:#2c3e2f;}
  .admin-bar{background:#1a472a;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
  .admin-bar .logo{color:#ffd966;font-weight:bold;font-size:1.2rem;}
  .admin-bar .logo i{color:#ffb347;margin-right:8px;}
  .admin-bar a{color:#ffebc2;text-decoration:none;font-size:0.9rem;}
  .admin-bar a:hover{color:#ffb347;}
  .admin-container{max-width:1400px;margin:2rem auto;padding:0 2rem;}
  h1{color:#1a472a;font-size:1.8rem;margin-bottom:2rem;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-bottom:2.5rem;}
  .stat-card{background:white;border-radius:20px;padding:1.5rem;text-align:center;box-shadow:0 3px 15px rgba(0,0,0,0.08);}
  .stat-card i{font-size:2rem;color:#ffb347;margin-bottom:0.5rem;}
  .stat-number{font-size:2rem;font-weight:bold;color:#1a472a;}
  .stat-card p{color:#666;margin-top:0.3rem;}
  .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;}
  .tab-btn{padding:10px 24px;border:2px solid #ddd;border-radius:30px;background:white;cursor:pointer;font-weight:600;transition:0.3s;}
  .tab-btn.active{background:#1a472a;color:white;border-color:#1a472a;}
  .table-wrap{background:white;border-radius:20px;overflow:hidden;box-shadow:0 3px 15px rgba(0,0,0,0.08);}
  table{width:100%;border-collapse:collapse;}
  thead{background:#1a472a;color:white;}
  th,td{padding:12px 16px;text-align:left;font-size:0.9rem;}
  tr:nth-child(even){background:#f8f9fa;}
  tr:hover{background:#fff3e0;}
  .delete-btn{background:#dc3545;color:white;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:0.8rem;transition:0.3s;}
  .delete-btn:hover{background:#c82333;}
  .clear-btn{background:#e67e22;color:white;border:none;padding:10px 24px;border-radius:30px;cursor:pointer;font-weight:bold;margin-left:0.5rem;transition:0.3s;}
  .clear-btn:hover{background:#d35400;}
  .no-data{text-align:center;padding:3rem;color:#888;}
  .no-data i{font-size:2.5rem;color:#ffb347;display:block;margin-bottom:0.5rem;}
  .action-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;}
  .search-input{padding:8px 16px;border:2px solid #ddd;border-radius:30px;font-size:0.9rem;outline:none;width:250px;transition:0.3s;}
  .search-input:focus{border-color:#ffb347;}
  @media(max-width:768px){table{display:block;overflow-x:auto;}.stats-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="admin-bar">
  <div class="logo"><i class="fas fa-tachometer-alt"></i> Admin Panel – Tourism of India</div>
  <a href="index.html"><i class="fas fa-home"></i> Back to Site</a>
</div>

<div class="admin-container">
  <h1><i class="fas fa-chart-bar"></i> Dashboard Overview</h1>

  <div class="stats-grid" id="statsContainer"></div>

  <div class="action-bar">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('places',this)"><i class="fas fa-map-marker-alt"></i> Place Bookings</button>
      <button class="tab-btn" onclick="switchTab('packages',this)"><i class="fas fa-suitcase"></i> Package Bookings</button>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <input class="search-input" id="adminSearch" type="text" placeholder="🔍 Search bookings..." oninput="renderTable()">
      <button class="clear-btn" onclick="clearAllBookings()"><i class="fas fa-trash"></i> Clear All</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="tableHeader"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  let allBookings = [];
  let currentTab = 'places';

  function loadBookings() {
    allBookings = JSON.parse(localStorage.getItem('tourism_all_bookings') || '[]');
  }

  function updateStats() {
    const total = allBookings.length;
    const revenue = allBookings.reduce((s,b) => s+(b.totalAmount||0), 0);
    const places = allBookings.filter(b=>b.type==='place').length;
    const pkgs = allBookings.filter(b=>b.type==='package').length;
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><i class="fas fa-calendar-check"></i><div class="stat-number">${total}</div><p>Total Bookings</p></div>
      <div class="stat-card"><i class="fas fa-rupee-sign"></i><div class="stat-number">₹${revenue.toLocaleString()}</div><p>Total Revenue</p></div>
      <div class="stat-card"><i class="fas fa-map-marker-alt"></i><div class="stat-number">${places}</div><p>Place Bookings</p></div>
      <div class="stat-card"><i class="fas fa-suitcase"></i><div class="stat-number">${pkgs}</div><p>Package Bookings</p></div>`;
  }

  function renderTable() {
    const q = document.getElementById('adminSearch').value.toLowerCase();
    const type = currentTab === 'places' ? 'place' : 'package';
    let filtered = allBookings.filter(b => b.type === type);
    if (q) filtered = filtered.filter(b =>
      (b.userName||'').toLowerCase().includes(q) ||
      (b.userEmail||'').toLowerCase().includes(q) ||
      (b.placeName||b.packageName||'').toLowerCase().includes(q));
    
    const thead = document.getElementById('tableHeader');
    const tbody = document.getElementById('tableBody');
    
    if (filtered.length === 0) {
      thead.innerHTML = '';
      tbody.innerHTML = `<tr><td colspan="8"><div class="no-data"><i class="fas fa-inbox"></i>No bookings found.</div></td></tr>`;
      return;
    }

    thead.innerHTML = `<tr><th>ID</th><th>${type==='place'?'Place':'Package'}</th><th>Customer</th><th>Email</th><th>${type==='place'?'Seats':'Travelers'}</th><th>Travel Date</th><th>Amount</th><th>Action</th></tr>`;
    tbody.innerHTML = filtered.map(b => `
      <tr>
        <td><small>#${b.id}</small></td>
        <td><strong>${b.placeName||b.packageName}</strong></td>
        <td>${b.userName}</td>
        <td>${b.userEmail}</td>
        <td>${b.seats||b.travelers}</td>
        <td>${b.travelDate}</td>
        <td><strong>₹${(b.totalAmount||0).toLocaleString()}</strong></td>
        <td><button class="delete-btn" onclick="deleteBooking(${b.id})"><i class="fas fa-trash"></i> Delete</button></td>
      </tr>`).join('');
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function deleteBooking(id) {
    if (!confirm('Are you sure you want to delete this booking?')) return;
    allBookings = allBookings.filter(b => b.id !== id);
    localStorage.setItem('tourism_all_bookings', JSON.stringify(allBookings));
    updateStats();
    renderTable();
  }

  function clearAllBookings() {
    if (!confirm('⚠️ This will permanently delete ALL bookings. Are you sure?')) return;
    allBookings = [];
    localStorage.setItem('tourism_all_bookings', JSON.stringify([]));
    updateStats();
    renderTable();
  }

  function initAdmin() {
    loadBookings();
    updateStats();
    renderTable();
  }

  initAdmin();
</script>
</body>
</html>
